<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Stats</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .stats-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 900px;
            width: 90%;
        }

        .stat {
            text-align: center;
        }

        .circle {
            width: 120px; /* Increased size for better readability */
            height: 120px;
            background-color: #007bff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

        .stat h2 {
            color: #007bff;
            font-size: 28px;
            margin: 10px 0;
        }

        .stat p {
            color: #333;
            font-size: 16px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat">
            <div class="circle">10,000+</div>
            <p>Customers we have served</p>
        </div>
        <div class="stat">
            <div class="circle">97%</div>
            <p>Of our clients recommend us</p>
        </div>
        <div class="stat">
            <div class="circle">30+</div>
            <p>Years of meeting client needs</p>
        </div>
    </div>

</body>
</html>
