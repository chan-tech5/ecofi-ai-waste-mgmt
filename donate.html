<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate | EcoFi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            text-align: center;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: white;
            color: black;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .logo img {
            height: 80px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            padding: 10px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #0073e6;
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* Responsive Navigation */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background: white;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                text-align: center;
                padding: 15px 0;
            }
            
            .nav-links.active {
                display: flex;
            }

            .hamburger {
                display: block;
            }
        }

        /* Donation Section */
        .container {
            max-width: 900px;
            margin: 100px auto 50px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        .donation-options {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .donation-box {
            background: #f1f1f1;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            min-width: 120px;
            max-width: 200px;
        }

        .donation-box:hover {
            background: #0073e6;
            color: white;
        }

        .donation-form input, .donation-form select, .donation-form button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .donate-btn {
            background-color: #9146ff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .donate-btn:hover {
            background-color: #721ce3;
        }

        /* Contact Section */
        .contact-section {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="logo.png" alt="EcoFi Logo">
        </div>
        <button class="hamburger" id="menu-toggle"><i class="fas fa-bars"></i></button>
        <nav class="nav-links" id="nav-menu">
            <a href="index.html">Home</a>
            <a href="#cnt">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h1>Support Our Mission</h1>
        <p>Your donation will help us build a cleaner, greener, and more sustainable future. Every contribution makes a difference.</p>
        
        <div class="donation-options">
            <div class="donation-box">₹500</div>
            <div class="donation-box">₹1000</div>
            <div class="donation-box">₹5000</div>
            <div class="donation-box">Other</div>
        </div>

        <form class="donation-form">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="number" placeholder="Enter Amount" required>
            <select>
                <option value="">Select Payment Method</option>
                <option value="credit">Credit/Debit Card</option>
                <option value="upi">UPI</option>
                <option value="netbanking">Net Banking</option>
            </select>
            <button type="submit" class="donate-btn">Donate Now</button>
        </form>
    </div>
    
    <section id="cnt">
        <div class="contact-section">
            <h2>Contact Us</h2>
            <p>If you have any questions, feel free to reach out to us!</p>
            <p>Email: support@ecofi.com</p>
            <p>Phone: +91 98765 43210</p>
        </div>
    </section>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const navMenu = document.getElementById('nav-menu');
        
        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });
        
        document.addEventListener('click', (event) => {
            if (!menuToggle.contains(event.target) && !navMenu.contains(event.target)) {
                navMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
