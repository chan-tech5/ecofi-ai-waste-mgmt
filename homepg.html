<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waste Management Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: url('homepg img.jpg') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .dashboard-container {
      width: 90%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.366);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      text-align: center;
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 24px;
      color: #09b923;
    }

    .chat-icon {
      width: 40px;
      height: 40px;
      background: #3db03d;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .chatbox {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 250px;
      background: white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

    .chatbox input {
      width: 100%;
      padding: 5px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .events {
      background: #c8e6c9;
      padding: 10px;
      border-radius: 10px;
      margin: 20px 0;
    }

    .events h2 {
      font-size: 18px;
      color: #1b5e20;
    }

    .events ul {
      list-style: none;
      padding: 0;
    }

    .events ul li {
      font-size: 14px;
      color: #2e7d32;
      margin: 5px 0;
    }

    .camera-button {
      width: 60px;
      height: 60px;
      background: #f2f0ee6d;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .menu {
      display: flex;
      justify-content: space-around;
      background: #388e3c;
      padding: 10px;
      border-radius: 10px;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .feedback {
      background: #ffffff;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .feedback h2 {
      font-size: 18px;
      color: #1b5e20;
    }

    .feedback textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      margin-top: 10px;
    }

    .feedback button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <div class="header">
      <h1>Waste Management Dashboard</h1>
      <div class="chat-icon" onclick="toggleChat()">💬</div>
    </div>

    <div class="chatbox" id="chatbox">
      <p>Chat Assistant: How can I help?</p>
      <input type="text" placeholder="Type a message...">
    </div>

    <div class="events">
      <h2>📢 Upcoming Events</h2>
      <ul>
        <li>♻️ Cleanup Drive - March 10</li>
        <li>🛒 E-Waste Collection - March 20</li>
        <li>📢 Recycling Workshop - April 5</li>
      </ul>
    </div>

    <div class="feedback">
      <h2>💬 Feedback</h2>
      <textarea placeholder="Write your feedback here..."></textarea>
      <button onclick="submitFeedback()">Submit</button>
    </div>
  </div>

  <div class="camera-button" onclick="openCamera()">📷</div>

  <div class="menu">
    <a href="#">🏆 Leaderboard</a>
    <a href="#">🗺️ Map Tracking</a>
    <a href="#">⋮ More</a>
  </div>

  <script>
    function toggleChat() {
      var chatbox = document.getElementById("chatbox");
      chatbox.style.display = chatbox.style.display === "block" ? "none" : "block";
    }

    function openCamera() {
      alert("Opening Camera...");
    }
  </script>
</body>
</html>
